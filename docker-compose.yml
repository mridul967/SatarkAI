services:
  # --- ENTERPRISE INFRASTRUCTURE ---

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Listeners configured for both internal container traffic and external host traffic
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  neo4j:
    image: neo4j:5.12.0
    ports:
      - "7474:7474" # HTTP Browser UI
      - "7687:7687" # Bolt Protocol (Python driver uses this)
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - ./data/neo4j:/data

  # --- CORE APPLICATION ---

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      # Injecting the internal docker hostnames so FastAPI can connect
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./backend/models:/app/models
    depends_on:
      - redis
      - neo4j
      - kafka

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # ── SLM Service (Phase 2.5) — only starts with --profile slm ──────────
  slm_service:
    profiles:
      - slm                            # NEVER starts with plain `docker compose up`
    build:
      context: ./slm_service
      dockerfile: Dockerfile
    ports:
      - '8765:8765'
    volumes:
      - ./slm_service/satark-slm-final:/app/satark-slm-final:ro
    environment:
      - SLM_BASE_MODEL=mistralai/Mistral-7B-Instruct-v0.3
      - SLM_ADAPTER_PATH=/app/satark-slm-final
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8765/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
